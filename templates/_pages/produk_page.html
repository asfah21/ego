<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisis Produk & Metrik - ShadowSelf</title>
    
    <!-- CDNs -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <!-- Custom Modular CSS & JS -->
    <link rel="stylesheet" href="/assets/css/style.css">
    <script src="/assets/js/app.js" defer></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="min-h-screen flex flex-col justify-between selection:bg-red-500 selection:text-white bg-grid bg-gradient-index transition-colors duration-300" x-data>

    <!-- Navbar -->
    {{template "navbar" .}}

    <!-- Product Section -->
    <main class="flex-grow py-12">
        {{template "produk" .}}
    </main>

    <!-- Footer -->
    {{template "footer" .}}

</body>
</html>
