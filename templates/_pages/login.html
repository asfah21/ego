<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - ShadowSelf</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="bg-neutral-100 min-h-screen flex items-center justify-center px-4">

    <div class="w-full max-w-sm">
        <div class="text-center mb-8">
            <span class="text-red-600 font-black tracking-widest text-lg font-mono">SHADOW<span class="text-neutral-800">SELF</span></span>
            <p class="text-sm text-neutral-500 mt-1 font-mono">Admin Panel</p>
        </div>

        <div class="bg-white border border-neutral-200 rounded-xl p-6 shadow-sm">
            <h1 class="text-lg font-bold text-neutral-900 mb-1">Masuk</h1>
            <p class="text-sm text-neutral-500 mb-5">Gunakan kredensial admin untuk mengakses dashboard.</p>

            {{if .Error}}
            <div class="bg-red-50 border border-red-200 rounded-lg p-3 mb-4">
                <p class="text-sm text-red-700">{{.Error}}</p>
            </div>
            {{end}}

            <form method="POST" action="/admin/login" class="space-y-4">
                <div>
                    <label class="block text-xs font-mono uppercase tracking-widest text-neutral-500 mb-1.5">Username</label>
                    <input type="text" name="username" placeholder="admin" required
                           class="w-full bg-neutral-50 border border-neutral-200 rounded-lg px-3.5 py-3 text-sm focus:outline-none focus:border-red-500 focus:ring-1 focus:ring-red-500 transition placeholder:text-neutral-400">
                </div>
                <div>
                    <label class="block text-xs font-mono uppercase tracking-widest text-neutral-500 mb-1.5">Password</label>
                    <input type="password" name="password" placeholder="••••••••" required
                           class="w-full bg-neutral-50 border border-neutral-200 rounded-lg px-3.5 py-3 text-sm focus:outline-none focus:border-red-500 focus:ring-1 focus:ring-red-500 transition placeholder:text-neutral-400">
                </div>
                <button type="submit"
                        class="w-full bg-neutral-900 hover:bg-neutral-800 text-white font-semibold py-3 rounded-lg text-sm transition cursor-pointer">
                    Masuk
                </button>
            </form>

            <p class="text-xs text-neutral-400 text-center mt-4 font-mono">🔒 Hanya untuk admin</p>
        </div>
    </div>

</body>
</html>
