<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - ShadowSelf</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="bg-white min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-sm">
        <div class="text-center mb-8">
            <p class="text-red-600 font-black tracking-widest text-sm font-mono">SHADOWSELF</p>
            <p class="text-xs text-neutral-400 font-mono uppercase tracking-wider mt-1">Admin Panel</p>
        </div>

        <div class="bg-white border border-neutral-200 rounded-xl p-6 shadow-sm">
            <h1 class="text-sm font-semibold text-neutral-900 mb-5 text-center">Masuk ke Dashboard</h1>

            {{if .Error}}
            <div class="bg-red-50 border border-red-200 rounded-lg p-3 mb-4">
                <p class="text-sm text-red-600">{{.Error}}</p>
            </div>
            {{end}}

            <form method="POST" action="/admin/login" class="space-y-4">
                <div>
                    <label class="block text-xs font-mono uppercase tracking-widest text-neutral-500 mb-1.5">Username</label>
                    <input type="text" name="username" required
                           class="w-full bg-white border border-neutral-200 rounded-lg px-3.5 py-2.5 text-sm focus:outline-none focus:border-red-500 focus:ring-1 focus:ring-red-500 transition placeholder:text-neutral-400"
                           placeholder="admin">
                </div>
                <div>
                    <label class="block text-xs font-mono uppercase tracking-widest text-neutral-500 mb-1.5">Password</label>
                    <input type="password" name="password" required
                           class="w-full bg-white border border-neutral-200 rounded-lg px-3.5 py-2.5 text-sm focus:outline-none focus:border-red-500 focus:ring-1 focus:ring-red-500 transition placeholder:text-neutral-400"
                           placeholder="••••••">
                </div>
                <button type="submit"
                        class="w-full bg-red-600 hover:bg-red-700 text-white font-semibold py-2.5 rounded-lg text-sm transition shadow-sm cursor-pointer">
                    Masuk
                </button>
            </form>
        </div>

        <p class="text-xs text-neutral-400 text-center mt-6 font-mono">© 2026 ShadowSelf</p>
    </div>
</body>
</html>
