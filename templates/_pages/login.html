<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - ShadowSelf</title>
    <meta name="theme-color" content="#ef4444">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
    <link rel="stylesheet" href="/assets/css/style.css">
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-grid bg-gradient-index text-[var(--textMain)]" style="font-family: 'Inter', system-ui, -apple-system, sans-serif;">

    <div class="w-full max-w-sm mx-auto px-4">
        <div class="text-center mb-8">
            <div class="flex justify-center mb-3">
                <div class="flex h-12 w-12 items-center justify-center rounded-xl" style="background: linear-gradient(135deg, #ef4444, #dc2626);">
                    <span class="material-symbols-outlined text-white text-2xl">psychology</span>
                </div>
            </div>
            <h1 class="text-xl font-bold text-[var(--textMain)]">Admin ShadowSelf</h1>
            <p class="text-sm text-[var(--textMuted)]">Masuk untuk mengelola data</p>
        </div>

        <div class="card p-6">
            <form action="/admin/login" method="POST" class="space-y-4">
                <div>
                    <label class="block text-xs font-mono uppercase tracking-widest text-[var(--textMuted)] mb-1.5">
                        Username
                    </label>
                    <input type="text" name="username" placeholder="admin" required
                           class="input-field">
                </div>
                <div>
                    <label class="block text-xs font-mono uppercase tracking-widest text-[var(--textMuted)] mb-1.5">
                        Password
                    </label>
                    <input type="password" name="password" placeholder="••••••••" required
                           class="input-field">
                </div>
                <button type="submit"
                        class="w-full inline-flex items-center justify-center gap-2 rounded-xl font-semibold transition-all duration-200 cursor-pointer bg-[var(--brand-500)] hover:bg-[var(--brand-600)] text-white shadow-sm h-11 text-sm">
                    <span class="material-symbols-outlined">login</span>
                    Masuk
                </button>
            </form>
        </div>

        <p class="text-center mt-4">
            <a href="/" class="text-xs text-[var(--textMuted)] hover:text-[var(--brand-500)] transition flex items-center justify-center gap-1">
                <span class="material-symbols-outlined text-xs">arrow_back</span>
                Kembali ke Beranda
            </a>
        </p>
    </div>

</body>
</html>
