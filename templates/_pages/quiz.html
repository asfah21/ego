{{define "content"}}
<section class="min-h-screen pt-24 pb-16 bg-gradient-quiz">
    <div class="mx-auto max-w-[640px] px-6 lg:px-8">
        <!-- Quiz Container -->
        <div x-data="quizApp()" x-init="init()" class="space-y-8">
            <!-- Progress -->
            <div class="text-center fade-in-up">
                <div class="flex items-center justify-center gap-2 mb-3">
                    <span class="text-xs font-semibold text-[var(--textMuted)]">Langkah</span>
                    <span class="text-xs font-mono font-bold text-[var(--accent-500)]" x-text="currentStep + 1"></span>
                    <span class="text-xs text-[var(--textSubtle)]">/ 6</span>
                </div>
                    <div class="progress-bar max-w-xs mx-auto">
                        <div class="progress-fill" :style="'width:' + ((currentStep + 1) / 6 * 100) + '%'" style="background: var(--accent);"></div>
                    </div>
            </div>

            <!-- Questions Step 1-5 -->
            <template x-for="(q, idx) in questions" :key="idx">
                <div x-show="currentStep === idx && !loading && !showIdentity" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-x-8" x-transition:enter-end="opacity-100 translate-x-0" class="space-y-6">
                    <div class="card card-elevated p-8 transition-all duration-300">
                        <div class="flex items-start gap-4 mb-6">
                            <div class="w-10 h-10 rounded-2xl bg-[var(--accent-50)] flex items-center justify-center flex-shrink-0">
                                <span class="text-sm font-bold text-[var(--accent-500)]" x-text="'0' + (idx + 1)"></span>
                            </div>
                            <div>
                                <p class="text-sm font-medium text-[var(--textSubtle)] mb-1" x-text="'Pertanyaan ' + (idx + 1)"></p>
                                <h3 class="text-lg font-bold text-[var(--textMain)] m-0 leading-snug" x-text="q.text"></h3>
                            </div>
                        </div>

                        <div class="space-y-3">
                            <template x-for="(opt, oidx) in q.options" :key="oidx">
                                <label class="flex items-center gap-3 p-4 rounded-2xl border border-[var(--bordLight)] cursor-pointer transition-all duration-200 hover:border-[var(--accent-300)] hover:bg-[var(--accent-50)] hover:shadow-sm" :class="{ 'border-[var(--accent-400)] bg-[var(--accent-50)] ring-1 ring-[var(--accent-200)] shadow-sm': answers[idx] === opt.value }">
                                    <input type="radio" :name="'q' + (idx + 1)" :value="opt.value" x-model="answers[idx]" class="w-4 h-4 accent-[var(--accent-500)] cursor-pointer">
                                    <span class="text-sm text-[var(--textMain)] font-medium" x-text="opt.label"></span>
                                </label>
                            </template>
                        </div>
                    </div>

                    <div class="flex justify-between items-center">
                        <button x-show="idx > 0" @click="currentStep--" class="btn-secondary text-sm transition-all duration-200">
                            <span class="material-symbols-outlined text-base">arrow_back</span>
                            Sebelumnya
                        </button>
                        <div x-show="idx === 0"></div>
                        <button @click="nextStep()" :disabled="!answers[idx]" class="btn-primary text-sm transition-all duration-200" :class="{ 'opacity-50 cursor-not-allowed': !answers[idx] }">
                            <template x-if="idx < questions.length - 1">
                                <span class="flex items-center gap-1">Selanjutnya <span class="material-symbols-outlined text-base">arrow_forward</span></span>
                            </template>
                            <template x-if="idx === questions.length - 1">
                                <span class="flex items-center gap-1">Lanjut <span class="material-symbols-outlined text-base">arrow_forward</span></span>
                            </template>
                        </button>
                    </div>
                </div>
            </template>

            <!-- Identity Step -->
            <div x-show="showIdentity && !loading" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-x-8" x-transition:enter-end="opacity-100 translate-x-0" class="space-y-6">
                <div class="card card-elevated p-8 transition-all duration-300">
                    <div class="flex items-start gap-4 mb-6">
                        <div class="w-10 h-10 rounded-2xl bg-[var(--accent-50)] flex items-center justify-center flex-shrink-0">
                            <span class="text-sm font-bold text-[var(--accent-500)]">06</span>
                        </div>
                        <div>
                            <p class="text-sm font-medium text-[var(--textSubtle)] mb-1">Langkah Terakhir</p>
                            <h3 class="text-lg font-bold text-[var(--textMain)] m-0">Data Diri</h3>
                        </div>
                    </div>

                    <form id="quizForm" @submit.prevent="submitQuiz()" class="space-y-5">
                        <div>
                            <label class="block text-sm font-medium text-[var(--textMain)] mb-1.5">Nama Lengkap</label>
                            <input type="text" name="nama" required placeholder="Masukkan nama kamu" class="input-field transition-all duration-200" x-model="nama">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-[var(--textMain)] mb-1.5">Email</label>
                            <input type="email" name="email" required placeholder="contoh@email.com" class="input-field transition-all duration-200" x-model="email">
                        </div>
                        <div class="pt-2">
                            <button type="submit" class="btn-primary w-full shadow-glow transition-all duration-300">
                                <span class="material-symbols-outlined text-lg">send</span>
                                Kirim Jawaban
                            </button>
                        </div>
                    </form>
                </div>

                <div class="flex justify-between">
                    <button @click="showIdentity = false; currentStep = questions.length - 1" class="btn-secondary text-sm transition-all duration-200">
                        <span class="material-symbols-outlined text-base">arrow_back</span>
                        Kembali
                    </button>
                </div>
            </div>

            <!-- Loading State -->
            <div x-show="loading" x-transition:enter="transition ease-out duration-300" class="text-center py-20">
                <div class="card card-elevated p-10 max-w-sm mx-auto transition-all duration-300">
                    <div class="flex justify-center gap-2 mb-6">
                        <span class="w-3 h-3 rounded-full bg-[var(--accent-500)] pulse-dot"></span>
                        <span class="w-3 h-3 rounded-full bg-[var(--accent-500)] pulse-dot"></span>
                        <span class="w-3 h-3 rounded-full bg-[var(--accent-500)] pulse-dot"></span>
                    </div>
                    <p class="text-sm font-medium text-[var(--textMuted)] m-0">Memproses jawaban...</p>
                    <div class="progress-bar mt-4">
                        <div class="progress-fill" style="width:100%;background:var(--accent);animation:progressIndeterminate 1.5s ease-in-out infinite;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<script>
function quizApp() {
    return {
        currentStep: 0,
        answers: [null, null, null, null, null],
        nama: '',
        email: '',
        loading: false,
        showIdentity: false,
        questions: [
            {
                text: 'Seberapa sering kamu merasa bahwa kamu layak mendapatkan pengakuan khusus?',
                options: [
                    { value: 1, label: 'Tidak Sesuai' },
                    { value: 2, label: 'Cukup Sesuai' },
                    { value: 3, label: 'Sangat Sesuai' }
                ]
            },
            {
                text: 'Seberapa sering kamu menggunakan pesona pribadi untuk mencapai tujuan?',
                options: [
                    { value: 1, label: 'Tidak Sesuai' },
                    { value: 2, label: 'Cukup Sesuai' },
                    { value: 3, label: 'Sangat Sesuai' }
                ]
            },
            {
                text: 'Seberapa sering kamu bertindak tanpa memikirkan konsekuensinya?',
                options: [
                    { value: 1, label: 'Tidak Sesuai' },
                    { value: 2, label: 'Cukup Sesuai' },
                    { value: 3, label: 'Sangat Sesuai' }
                ]
            },
            {
                text: 'Seberapa penting bagimu untuk dikagumi oleh orang lain?',
                options: [
                    { value: 1, label: 'Tidak Sesuai' },
                    { value: 2, label: 'Cukup Sesuai' },
                    { value: 3, label: 'Sangat Sesuai' }
                ]
            },
            {
                text: 'Seberapa sering kamu menunda penyesalan untuk meraih keuntungan?',
                options: [
                    { value: 1, label: 'Tidak Sesuai' },
                    { value: 2, label: 'Cukup Sesuai' },
                    { value: 3, label: 'Sangat Sesuai' }
                ]
            }
        ],
        init() {
            const saved = localStorage.getItem('quizState');
            if (saved) {
                try {
                    const state = JSON.parse(saved);
                    this.answers = state.answers || [null, null, null, null, null];
                    this.currentStep = state.currentStep || 0;
                    this.nama = state.nama || '';
                    this.email = state.email || '';
                } catch(e) {}
            }
        },
        saveState() {
            localStorage.setItem('quizState', JSON.stringify({
                answers: this.answers,
                currentStep: this.currentStep,
                nama: this.nama,
                email: this.email
            }));
        },
        nextStep() {
            if (this.answers[this.currentStep] === null) return;
            if (this.currentStep < this.questions.length - 1) {
                this.currentStep++;
                this.saveState();
            } else {
                this.showIdentity = true;
                this.saveState();
            }
        },
        submitQuiz() {
            if (!this.nama || !this.email) return;
            this.loading = true;

            const formData = new FormData();
            formData.append('nama', this.nama);
            formData.append('email', this.email);
            this.answers.forEach((a, i) => formData.append('q' + (i + 1), a));

            fetch('/submit-tes', {
                method: 'POST',
                body: formData
            })
            .then(r => r.json())
            .then(data => {
                localStorage.removeItem('quizState');
                window.location.href = '/paywall/' + data.id;
            })
            .catch(() => {
                alert('Terjadi kesalahan. Silakan coba lagi.');
                this.loading = false;
            });
        }
    }
}
</script>
{{end}}
