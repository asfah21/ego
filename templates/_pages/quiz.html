<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asesmen Dark Triad - ShadowSelf</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        [x-cloak] { display: none !important; }
        .option-btn { transition: all 0.12s ease; }
        .option-btn:active { transform: scale(0.97); }
        .option-btn.selected { 
            border-color: #ef4444; 
            background-color: #fef2f2; 
            box-shadow: 0 0 0 1.5px #ef4444;
        }
        .dark .option-btn.selected { 
            border-color: #f87171; 
            background-color: #450a0a; 
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.25s ease-out; }
        @keyframes pulse-dot { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        .pulse-dot { animation: pulse-dot 1.4s infinite ease-in-out; }
        .pulse-dot:nth-child(2) { animation-delay: 0.2s; }
        .pulse-dot:nth-child(3) { animation-delay: 0.4s; }
        /* Swipe hint animation */
        @keyframes swipeHint { 0%, 100% { transform: translateX(0); opacity: 0.5; } 50% { transform: translateX(6px); opacity: 1; } }
        .swipe-hint { animation: swipeHint 1.5s ease-in-out infinite; }
    </style>
</head>
<body class="bg-neutral-50 dark:bg-neutral-950 text-neutral-900 dark:text-neutral-100 min-h-screen" x-data="quizApp">

    <!-- ===== COMPACT TOP BAR ===== -->
    <header class="sticky top-0 z-50 bg-white/95 dark:bg-neutral-900/95 backdrop-blur-sm border-b border-neutral-200 dark:border-neutral-800 px-3 sm:px-6 py-2.5">
        <div class="max-w-2xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-2">
                <span class="text-red-600 dark:text-red-400 font-black tracking-widest text-xs font-mono">SHADOW<span class="text-neutral-900 dark:text-neutral-100">SELF</span></span>
                <span class="hidden sm:inline text-[9px] text-neutral-400 font-mono uppercase tracking-wider border-l border-neutral-300 dark:border-neutral-700 pl-2">Asesmen</span>
            </div>
            <div class="flex items-center gap-2.5">
                <!-- Step indicator: compact pill -->
                <span x-show="step === 'quiz'" 
                      class="text-[10px] font-mono font-bold text-neutral-500 dark:text-neutral-400 bg-neutral-100 dark:bg-neutral-800 px-2.5 py-1 rounded-full"
                      x-text="`${currentQuestion}/${totalQuestions}`"></span>
                <a href="/" class="text-[10px] text-neutral-400 hover:text-neutral-600 dark:hover:text-neutral-300 transition font-mono">✕ Tutup</a>
            </div>
        </div>
        <!-- Slim Progress Bar -->
        <div class="max-w-2xl mx-auto mt-1.5" x-show="step === 'quiz'">
            <div class="w-full bg-neutral-100 dark:bg-neutral-800 h-1 rounded-full overflow-hidden">
                <div class="bg-gradient-to-r from-red-500 to-amber-500 h-full rounded-full transition-all duration-400 ease-out" :style="`width: ${(currentQuestion / totalQuestions) * 100}%`"></div>
            </div>
        </div>
    </header>

    <!-- ===== MAIN QUIZ AREA ===== -->
    <main class="max-w-2xl mx-auto px-3 sm:px-6 py-4 sm:py-8">

        <!-- STEP: QUIZ -->
        <template x-if="step === 'quiz'">
            <div>
                <template x-for="(q, idx) in questions" :key="idx">
                    <div x-show="currentQuestion === idx + 1" x-cloak class="fade-in">

                        <!-- Compact Question Card -->
                        <div class="bg-white dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-800 rounded-xl p-4 sm:p-6 shadow-sm">

                            <!-- Header: Number badge + Dimension label -->
                            <div class="flex items-center gap-2 mb-3">
                                <span :class="`inline-flex items-center justify-center w-5 h-5 rounded-full text-white text-[9px] font-bold ${q.color}`" x-text="idx + 1"></span>
                                <span class="text-[9px] font-mono text-neutral-400 dark:text-neutral-500 uppercase tracking-wider truncate" x-text="q.dimension"></span>
                            </div>

                            <!-- Question Image: smaller, optional feel -->
                            <div class="relative w-full aspect-[3/1] sm:aspect-[4/1] bg-neutral-50 dark:bg-neutral-950 rounded-lg overflow-hidden border border-neutral-100 dark:border-neutral-800 mb-3 flex items-center justify-center">
                                <img :src="q.image" :alt="q.alt" class="w-full h-full object-cover"
                                     @error.once="$event.target.style.display='none'; $event.target.nextElementSibling.style.display='flex'">
                                <div class="hidden absolute inset-0 flex items-center justify-center text-neutral-400 dark:text-neutral-600 font-mono text-[10px]">
                                    🖼️ <span x-text="q.alt"></span>
                                </div>
                            </div>

                            <!-- Question Text: more compact -->
                            <div class="mb-4">
                                <p class="text-[9px] font-mono uppercase tracking-widest text-neutral-400 mb-1">Pernyataan:</p>
                                <h2 class="text-sm sm:text-base font-bold leading-relaxed" x-text="q.text"></h2>
                            </div>

                            <!-- Options: Horizontal scrollable on mobile, grid on desktop -->
                            <div class="flex sm:grid sm:grid-cols-5 gap-1.5 sm:gap-2 overflow-x-auto pb-1 sm:pb-0 -mx-1 sm:mx-0 px-1 sm:px-0"
                                 x-ref="optionContainer">
                                <template x-for="(opt, oi) in q.options" :key="oi">
                                    <button @click="selectAnswer(idx, oi + 1)"
                                            :class="`option-btn shrink-0 sm:shrink flex flex-col items-center justify-center p-2 sm:p-3 rounded-xl border text-center cursor-pointer
                                            ${answers[idx] === oi + 1 
                                                ? 'selected border-red-500 bg-red-50 dark:bg-red-950/30 dark:border-red-500' 
                                                : 'border-neutral-200 dark:border-neutral-800 bg-white dark:bg-neutral-950 hover:border-neutral-300 dark:hover:border-neutral-700'}`"
                                            style="min-width: 70px; max-width: 80px;"
                                            :class="{'sm:min-w-0 sm:max-w-none': true}">
                                        <span class="text-sm sm:text-base font-bold leading-none" 
                                              :class="answers[idx] === oi + 1 ? 'text-red-600 dark:text-red-400' : 'text-neutral-400 dark:text-neutral-500'" 
                                              x-text="oi + 1"></span>
                                        <span class="text-[9px] sm:text-[10px] mt-1 leading-tight text-neutral-500 dark:text-neutral-400 text-center" x-text="opt"></span>
                                    </button>
                                </template>
                            </div>

                            <!-- Swipe hint on mobile -->
                            <p class="sm:hidden text-[9px] text-neutral-400 text-center mt-2 swipe-hint">‹ Geser untuk lihat semua pilihan ›</p>

                            <!-- Navigation: compact -->
                            <div class="flex justify-between items-center mt-4 pt-3 border-t border-neutral-100 dark:border-neutral-800">
                                <button @click="prevQuestion" x-show="currentQuestion > 1"
                                        class="text-[10px] font-mono text-neutral-500 hover:text-neutral-700 dark:hover:text-neutral-300 transition cursor-pointer flex items-center gap-1">
                                    ← Sebelumnya
                                </button>
                                <div x-show="currentQuestion === 1" class="text-[10px] text-neutral-300 dark:text-neutral-700">← Sebelumnya</div>
                                <button @click="nextQuestion"
                                        class="bg-neutral-900 hover:bg-neutral-800 dark:bg-neutral-100 dark:hover:bg-neutral-200 text-white dark:text-neutral-900 font-bold py-2 px-4 rounded-lg text-[10px] sm:text-xs transition cursor-pointer">
                                    <span x-text="currentQuestion === totalQuestions ? 'Selesai →' : 'Selanjutnya →'"></span>
                                </button>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </template>

        <!-- STEP: IDENTITY (Email & Nama) — compact -->
        <template x-if="step === 'identity'">
            <div class="fade-in bg-white dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-800 rounded-xl p-5 sm:p-8 shadow-sm">
                <div class="text-center space-y-2 mb-5">
                    <div class="inline-flex items-center gap-1 py-0.5 px-2.5 bg-green-50 dark:bg-green-950/30 border border-green-100 dark:border-green-900/50 rounded-full text-green-600 dark:text-green-400 font-mono text-[9px] uppercase tracking-widest">
                        ✅ Selesai
                    </div>
                    <h1 class="text-lg sm:text-xl font-bold tracking-tight">Masukkan Email</h1>
                    <p class="text-xs text-neutral-500 dark:text-neutral-400">Hasil akan dikirim ke email Anda.</p>
                </div>
                <div class="space-y-3 max-w-sm mx-auto">
                    <div>
                        <label class="block text-[10px] font-mono uppercase tracking-widest text-neutral-500 dark:text-neutral-400 mb-1.5">
                            Email <span class="text-red-500">*</span>
                        </label>
                        <input type="email" x-model="email" placeholder="nama@email.com" 
                               class="w-full bg-neutral-50 dark:bg-neutral-950 border border-neutral-200 dark:border-neutral-800 rounded-lg px-3.5 py-3 text-sm focus:outline-none focus:border-red-500 focus:ring-1 focus:ring-red-500 transition placeholder:text-neutral-400"
                               :class="{'border-red-400 dark:border-red-700': emailError}"
                               @keydown.enter="submitQuiz()">
                        <p x-show="emailError" class="text-[10px] text-red-500 mt-1 font-mono">Email wajib diisi dengan format valid.</p>
                    </div>
                    <div>
                        <label class="block text-[10px] font-mono uppercase tracking-widest text-neutral-500 dark:text-neutral-400 mb-1.5">
                            Nama / Inisial <span class="text-neutral-400">(opsional)</span>
                        </label>
                        <input type="text" x-model="nama" placeholder="Misal: Pasangan saya" 
                               class="w-full bg-neutral-50 dark:bg-neutral-950 border border-neutral-200 dark:border-neutral-800 rounded-lg px-3.5 py-3 text-sm focus:outline-none focus:border-red-500 focus:ring-1 focus:ring-red-500 transition placeholder:text-neutral-400"
                               @keydown.enter="submitQuiz()">
                    </div>
                    
                    <button @click="submitQuiz()" :disabled="isSubmitting"
                            class="w-full bg-neutral-900 hover:bg-neutral-800 dark:bg-neutral-100 dark:hover:bg-neutral-200 text-white dark:text-neutral-900 font-bold py-3 rounded-lg transition text-sm cursor-pointer flex items-center justify-center gap-2 mt-1">
                        <span x-text="isSubmitting ? 'Memproses...' : 'Kirim & Lihat Hasil'"></span>
                        <svg class="animate-spin h-3.5 w-3.5" x-show="isSubmitting" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </button>
                    <p class="text-[9px] text-neutral-400 text-center font-mono">🔒 Data Anda aman dan terenkripsi</p>
                </div>
            </div>
        </template>

        <!-- STEP: LOADING — compact -->
        <template x-if="step === 'loading'">
            <div class="fade-in bg-white dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-800 rounded-xl p-5 sm:p-8 shadow-sm text-center">
                <div class="space-y-4 py-4 sm:py-6">
                    <!-- Compact spinner -->
                    <div class="relative w-14 sm:w-16 h-14 sm:h-16 mx-auto flex items-center justify-center">
                        <div class="absolute inset-0 border-2 border-dashed border-red-500/30 rounded-full animate-spin"></div>
                        <div class="absolute inset-1.5 border border-neutral-200 dark:border-neutral-800 rounded-full"></div>
                        <div class="w-8 sm:w-10 h-8 sm:h-10 bg-red-50 dark:bg-red-950/50 border border-red-200 dark:border-red-500/60 rounded-full flex items-center justify-center text-sm font-mono font-bold text-red-600 dark:text-red-400" x-text="loadProgress + '%'"></div>
                    </div>
                    
                    <div class="space-y-1.5 max-w-xs mx-auto">
                        <h3 class="text-[11px] font-mono tracking-wider text-red-600 dark:text-red-400 uppercase flex items-center justify-center gap-1">
                            <span x-text="loadingText"></span>
                            <span class="flex gap-0.5">
                                <span class="pulse-dot w-1 h-1 bg-red-500 rounded-full inline-block"></span>
                                <span class="pulse-dot w-1 h-1 bg-red-500 rounded-full inline-block"></span>
                                <span class="pulse-dot w-1 h-1 bg-red-500 rounded-full inline-block"></span>
                            </span>
                        </h3>
                        <p class="text-[10px] text-neutral-500 dark:text-neutral-400 leading-relaxed">Menyusun laporan hasil asesmen...</p>
                    </div>
                    
                    <div class="w-36 sm:w-44 bg-neutral-100 dark:bg-neutral-950 rounded-full h-1 mx-auto overflow-hidden border border-neutral-200 dark:border-neutral-800">
                        <div class="bg-gradient-to-r from-red-600 to-amber-500 h-full transition-all duration-100 rounded-full" :style="`width: ${loadProgress}%`"></div>
                    </div>
                </div>
            </div>
        </template>
    </main>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('quizApp', () => ({
                step: 'quiz',
                nama: '',
                email: '',
                currentQuestion: 1,
                totalQuestions: 3,
                answers: [null, null, null],
                isSubmitting: false,
                emailError: false,
                loadProgress: 0,
                loadingText: 'Menganalisis respons kuesioner',
                loadingTexts: [
                    'Menganalisis respons kuesioner',
                    'Menghitung deviasi skor terhadap indeks rata-rata populasi',
                    'Menyusun pemetaan klaster perilaku defensif subjek',
                    'Mengonstruksi berkas pelaporan klinis final'
                ],
                questions: [
                    {
                        dimension: 'NARSISME & EGO SUPERIORITAS',
                        color: 'bg-red-500',
                        image: '/assets/images/q1-narsisme.svg',
                        alt: 'Ilustrasi Narsisme',
                        text: '"Ketika terjadi konflik atau perbedaan pendapat, dia cenderung menolak sudut pandang saya, sulit menerima kritik, dan memosisikan dirinya sebagai pihak yang selalu benar."',
                        options: ['Sangat Tidak Sesuai', 'Tidak Sesuai', 'Netral', 'Sesuai', 'Sangat Sesuai']
                    },
                    {
                        dimension: 'KECENDERUNGAN MANIPULASI INTERPERSONAL',
                        color: 'bg-amber-500',
                        image: '/assets/images/q2-machiavellian.svg',
                        alt: 'Ilustrasi Machiavellianisme',
                        text: '"Dia sering kali memutarbalikkan fakta saat berdiskusi, menggunakan trik psikologis seperti gaslighting, atau membuat saya merasa bersalah atas kesalahan yang sebenarnya dia lakukan sendiri."',
                        options: ['Sangat Tidak Sesuai', 'Tidak Sesuai', 'Netral', 'Sesuai', 'Sangat Sesuai']
                    },
                    {
                        dimension: 'INDEKS RESPON EMPATI & AFEKSI',
                        color: 'bg-purple-500',
                        image: '/assets/images/q3-psikopati.svg',
                        alt: 'Ilustrasi Psikopati',
                        text: '"Dia jarang menunjukkan rasa penyesalan yang tulus atau empati yang nyata ketika mengetahui tindakannya telah menyakiti perasaan saya atau memojokkan posisi saya."',
                        options: ['Sangat Tidak Sesuai', 'Tidak Sesuai', 'Netral', 'Sesuai', 'Sangat Sesuai']
                    }
                ],
                selectAnswer(qIdx, value) {
                    this.answers[qIdx] = value;
                },
                nextQuestion() {
                    if (!this.answers[this.currentQuestion - 1]) {
                        alert('Silakan pilih jawaban terlebih dahulu.');
                        return;
                    }
                    if (this.currentQuestion < this.totalQuestions) {
                        this.currentQuestion++;
                    } else {
                        this.step = 'identity';
                    }
                },
                prevQuestion() {
                    if (this.currentQuestion > 1) this.currentQuestion--;
                },
                submitQuiz() {
                    if (!this.email || !this.email.includes('@') || !this.email.includes('.')) {
                        this.emailError = true;
                        return;
                    }
                    this.emailError = false;
                    this.isSubmitting = true;
                    this.step = 'loading';
                    this.startLoading();

                    const formData = new FormData();
                    formData.append('email', this.email);
                    formData.append('nama', this.nama);
                    formData.append('q1', this.answers[0] || '');
                    formData.append('q2', this.answers[1] || '');
                    formData.append('q3', this.answers[2] || '');

                    fetch('/submit-tes', {
                        method: 'POST',
                        body: formData
                    })
                    .then(res => res.json())
                    .then(data => {
                        if (data.error) {
                            alert('Gagal memproses: ' + data.error);
                            this.step = 'identity';
                            this.isSubmitting = false;
                            return;
                        }
                        this.finishLoading(data.id);
                    })
                    .catch(err => {
                        alert('Terjadi kesalahan: ' + err.message);
                        this.step = 'identity';
                        this.isSubmitting = false;
                    });
                },
                startLoading() {
                    this.loadProgress = 0;
                    this.loadingText = this.loadingTexts[0];
                    let textIndex = 0;
                    let interval = setInterval(() => {
                        if (this.loadProgress < 100) {
                            this.loadProgress += 1;
                            if (this.loadProgress % 25 === 0 && textIndex < 3) {
                                textIndex++;
                                this.loadingText = this.loadingTexts[textIndex];
                            }
                        } else {
                            clearInterval(interval);
                        }
                    }, 40);
                    this._loadInterval = interval;
                },
                finishLoading(userId) {
                    if (this._loadInterval) {
                        clearInterval(this._loadInterval);
                    }
                    this.loadProgress = 100;
                    this.loadingText = 'Selesai';
                    setTimeout(() => {
                        window.location.href = '/paywall/' + userId;
                    }, 800);
                }
            }));
        });
    </script>
</body>
</html>
