<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asesmen Dark Triad - ShadowSelf</title>
    <meta name="theme-color" content="#ef4444">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
    <link rel="stylesheet" href="/assets/css/style.css">
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-white text-[var(--textMain)] min-h-screen" x-data="quizApp">

    <!-- ===== COMPACT TOP BAR ===== -->
    <header class="fixed top-0 z-50 w-full border-b border-[var(--bord)] bg-white/95 backdrop-blur-sm px-3 sm:px-6 py-2.5">
        <div class="max-w-2xl mx-auto flex items-center justify-between">
            <a href="/" class="flex items-center gap-2 no-underline">
                <div class="flex h-7 w-7 items-center justify-center rounded-md" style="background: linear-gradient(135deg, #ef4444, #dc2626);">
                    <span class="material-symbols-outlined text-white text-sm">psychology</span>
                </div>
                <span class="text-[var(--brand-500)] font-black tracking-widest text-sm font-mono">SHADOWSELF</span>
                <span class="hidden sm:inline text-xs text-[var(--textSubtle)] font-mono uppercase tracking-wider border-l border-[var(--bord)] pl-2">Asesmen</span>
            </a>
            <div class="flex items-center gap-2.5">
                <span x-show="step === 'quiz'"
                      class="text-xs font-mono font-bold text-[var(--textMuted)] bg-[var(--bgAlt)] px-2.5 py-1 rounded-full flex items-center gap-1"
                      x-text="`${currentQuestion}/${totalQuestions}`">
                </span>
                <a href="/" class="text-xs text-[var(--textMuted)] hover:text-[var(--brand-500)] transition font-mono flex items-center gap-1">
                    <span class="material-symbols-outlined text-sm">close</span>
                    Tutup
                </a>
            </div>
        </div>
        <div class="max-w-2xl mx-auto mt-1.5" x-show="step === 'quiz'">
            <div class="w-full bg-[var(--bord)] h-1 rounded-full overflow-hidden">
                <div class="bg-gradient-to-r from-[var(--brand-500)] to-amber-500 h-full rounded-full transition-all duration-400 ease-out" :style="`width: ${(currentQuestion / totalQuestions) * 100}%`"></div>
            </div>
        </div>
    </header>

    <!-- Spacer for fixed header -->
    <div class="h-16"></div>

    <!-- ===== MAIN QUIZ AREA ===== -->
    <main class="max-w-2xl mx-auto px-3 sm:px-6 py-4 sm:py-8">

        <!-- STEP: QUIZ -->
        <template x-if="step === 'quiz'">
            <div>
                <template x-for="(q, idx) in questions" :key="idx">
                    <div x-show="currentQuestion === idx + 1" x-cloak class="fade-in">

                        <div class="card p-4 sm:p-6">
                            <div class="flex items-center gap-2 mb-3">
                                <span :class="`inline-flex items-center justify-center w-6 h-6 rounded-full text-white text-xs font-bold ${q.color}`" x-text="idx + 1"></span>
                                <span class="text-xs font-mono text-[var(--textSubtle)] uppercase tracking-wider truncate" x-text="q.dimension"></span>
                            </div>

                            <div class="relative w-full aspect-[3/1] sm:aspect-[4/1] bg-[var(--bgAlt)] rounded-lg overflow-hidden border border-[var(--bord)] mb-3 flex items-center justify-center">
                                <img :src="q.image" :alt="q.alt" class="w-full h-full object-cover"
                                     @error.once="$event.target.style.display='none'; $event.target.nextElementSibling.style.display='flex'">
                                <div class="hidden absolute inset-0 flex items-center justify-center text-[var(--textSubtle)] font-mono text-xs">
                                    <span class="material-symbols-outlined text-lg">image</span>
                                    <span x-text="q.alt"></span>
                                </div>
                            </div>

                            <div class="mb-4">
                                <p class="text-xs font-mono uppercase tracking-widest text-[var(--textSubtle)] mb-1">Pernyataan:</p>
                                <h2 class="text-base sm:text-lg font-bold leading-relaxed text-[var(--textMain)]" x-text="q.text"></h2>
                            </div>

                            <div class="flex sm:grid sm:grid-cols-4 gap-1.5 sm:gap-2 overflow-x-auto pb-1 sm:pb-0 -mx-1 sm:mx-0 px-1 sm:px-0"
                                 x-ref="optionContainer">
                                <template x-for="(opt, oi) in q.options" :key="oi">
                                    <button @click="selectAnswer(idx, oi + 1)"
                                            :class="`option-btn shrink-0 sm:shrink flex flex-col items-center justify-center p-2 sm:p-3 rounded-xl border text-center cursor-pointer
                                            ${answers[idx] === oi + 1
                                                ? 'selected border-[var(--brand-500)] bg-[var(--brand-50)]'
                                                : 'border-[var(--bord)] bg-white hover:border-[var(--brand-300)]'}`"
                                            style="min-width: 70px; max-width: 80px;">
                                        <span class="text-sm sm:text-base font-bold leading-none"
                                              :class="answers[idx] === oi + 1 ? 'text-[var(--brand-500)]' : 'text-[var(--textSubtle)]'"
                                              x-text="oi + 1"></span>
                                        <span class="text-xs sm:text-sm mt-1 leading-tight text-[var(--textMuted)] text-center" x-text="opt"></span>
                                    </button>
                                </template>
                            </div>

                            <p class="sm:hidden text-xs text-[var(--textSubtle)] text-center mt-2 swipe-hint flex items-center justify-center gap-1">
                                <span class="material-symbols-outlined text-xs">swipe</span>
                                Geser untuk lihat semua pilihan
                            </p>

                            <div class="flex justify-between items-center mt-4 pt-3 border-t border-[var(--bord)]">
                                <button @click="prevQuestion" x-show="currentQuestion > 1"
                                        class="text-xs font-mono text-[var(--textMuted)] hover:text-[var(--textMain)] transition cursor-pointer flex items-center gap-1">
                                    <span class="material-symbols-outlined text-sm">arrow_back</span>
                                    Sebelumnya
                                </button>
                                <div x-show="currentQuestion === 1" class="text-xs text-[var(--bord)]">← Sebelumnya</div>
                                <button @click="nextQuestion"
                                        class="inline-flex items-center justify-center gap-1 rounded-xl font-semibold transition-all duration-200 cursor-pointer bg-[var(--brand-500)] hover:bg-[var(--brand-600)] text-white shadow-sm h-9 px-4 text-xs sm:text-sm">
                                    <span x-text="currentQuestion === totalQuestions ? 'Selesai' : 'Selanjutnya'"></span>
                                    <span class="material-symbols-outlined text-sm">arrow_forward</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </template>

        <!-- STEP: IDENTITY (Email & Nama) -->
        <template x-if="step === 'identity'">
            <div class="fade-in card p-5 sm:p-8">
                <div class="text-center space-y-2 mb-5">
                    <div class="inline-flex items-center gap-1 py-0.5 px-2.5 badge-success">
                        <span class="material-symbols-outlined text-xs">check</span>
                        Selesai
                    </div>
                    <h1 class="text-lg sm:text-xl font-bold tracking-tight text-[var(--textMain)]">Masukkan Email</h1>
                    <p class="text-sm text-[var(--textMuted)]">Hasil akan dikirim ke email Anda. Atau langsung bayar untuk lihat hasil sekarang.</p>
                </div>
                <div class="space-y-3 max-w-sm mx-auto">
                    <div>
                        <label class="block text-xs font-mono uppercase tracking-widest text-[var(--textMuted)] mb-1.5">
                            Email <span class="text-[var(--brand-500)]">*</span>
                        </label>
                        <input type="email" x-model="email" placeholder="nama@email.com"
                               class="input-field"
                               :class="{'border-[var(--brand-500)]': emailError}"
                               @keydown.enter="submitQuiz()">
                        <p x-show="emailError" class="text-xs text-[var(--brand-500)] mt-1 font-mono flex items-center gap-1">
                            <span class="material-symbols-outlined text-xs">error</span>
                            Email wajib diisi dengan format valid.
                        </p>
                    </div>

                    <button @click="submitQuiz()" :disabled="isSubmitting"
                            class="w-full inline-flex items-center justify-center gap-2 rounded-xl font-semibold transition-all duration-200 cursor-pointer bg-[var(--brand-500)] hover:bg-[var(--brand-600)] text-white shadow-sm h-11 text-sm mt-1">
                        <span x-text="isSubmitting ? 'Memproses...' : 'Kirim & Lihat Hasil'"></span>
                        <svg class="animate-spin h-3.5 w-3.5" x-show="isSubmitting" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </button>
                    <p class="text-xs text-[var(--textSubtle)] text-center font-mono flex items-center justify-center gap-1">
                        <span class="material-symbols-outlined text-xs">lock</span>
                        Data Anda aman dan terenkripsi
                    </p>
                </div>
            </div>
        </template>

        <!-- STEP: LOADING -->
        <template x-if="step === 'loading'">
            <div class="fade-in card p-5 sm:p-8 text-center">
                <div class="space-y-4 py-4 sm:py-6">
                    <div class="relative w-14 sm:w-16 h-14 sm:h-16 mx-auto flex items-center justify-center">
                        <div class="absolute inset-0 border-2 border-dashed border-[var(--brand-500)]/30 rounded-full animate-spin"></div>
                        <div class="absolute inset-1.5 border border-[var(--bord)] rounded-full"></div>
                        <div class="w-8 sm:w-10 h-8 sm:h-10 bg-[var(--brand-50)] border border-[var(--brand-200)] rounded-full flex items-center justify-center text-sm font-mono font-bold text-[var(--brand-500)]" x-text="loadProgress + '%'"></div>
                    </div>

                    <div class="space-y-1.5 max-w-xs mx-auto">
                        <h3 class="text-sm font-mono tracking-wider text-[var(--brand-500)] uppercase flex items-center justify-center gap-1">
                            <span x-text="loadingText"></span>
                            <span class="flex gap-0.5">
                                <span class="pulse-dot w-1 h-1 bg-[var(--brand-500)] rounded-full inline-block"></span>
                                <span class="pulse-dot w-1 h-1 bg-[var(--brand-500)] rounded-full inline-block"></span>
                                <span class="pulse-dot w-1 h-1 bg-[var(--brand-500)] rounded-full inline-block"></span>
                            </span>
                        </h3>
                        <p class="text-xs text-[var(--textMuted)] leading-relaxed">Menyusun laporan hasil asesmen...</p>
                    </div>

                    <div class="w-36 sm:w-44 bg-[var(--bord)] rounded-full h-1 mx-auto overflow-hidden">
                        <div class="bg-gradient-to-r from-[var(--brand-500)] to-amber-500 h-full transition-all duration-100 rounded-full" :style="`width: ${loadProgress}%`"></div>
                    </div>
                </div>
            </div>
        </template>
    </main>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('quizApp', () => ({
                step: 'quiz',
                nama: '',
                email: '',
                currentQuestion: 1,
                totalQuestions: 5,
                answers: [null, null, null, null, null],
                isSubmitting: false,
                emailError: false,
                loadProgress: 0,
                loadingText: 'Menganalisis respons kuesioner',
                loadingTexts: [
                    'Menganalisis respons kuesioner',
                    'Menghitung deviasi skor terhadap indeks rata-rata populasi',
                    'Menyusun pemetaan klaster perilaku defensif subjek',
                    'Mengonstruksi berkas pelaporan klinis final'
                ],
                questions: [
                    {
                        dimension: 'NARSISME & EGO SUPERIORITAS',
                        color: 'bg-[var(--brand-500)]',
                        image: '/assets/images/q1-narsisme.svg',
                        alt: 'Ilustrasi Narsisme',
                        text: '"Ketika terjadi konflik atau perbedaan pendapat, dia cenderung menolak sudut pandang saya, sulit menerima kritik, dan memosisikan dirinya sebagai pihak yang selalu benar."',
                        options: ['Sangat Tidak Sesuai', 'Tidak Sesuai', 'Netral', 'Sangat Sesuai']
                    },
                    {
                        dimension: 'KECENDERUNGAN MANIPULASI INTERPERSONAL',
                        color: 'bg-amber-500',
                        image: '/assets/images/q2-machiavellian.svg',
                        alt: 'Ilustrasi Machiavellianisme',
                        text: '"Dia sering kali memutarbalikkan fakta saat berdiskusi, menggunakan trik psikologis seperti gaslighting, atau membuat saya merasa bersalah atas kesalahan yang sebenarnya dia lakukan sendiri."',
                        options: ['Sangat Tidak Sesuai', 'Tidak Sesuai', 'Netral', 'Sangat Sesuai']
                    },
                    {
                        dimension: 'INDEKS RESPON EMPATI & AFEKSI',
                        color: 'bg-purple-500',
                        image: '/assets/images/q3-psikopati.svg',
                        alt: 'Ilustrasi Psikopati',
                        text: '"Dia jarang menunjukkan rasa penyesalan yang tulus atau empati yang nyata ketika mengetahui tindakannya telah menyakiti perasaan saya atau memojokkan posisi saya."',
                        options: ['Sangat Tidak Sesuai', 'Tidak Sesuai', 'Netral', 'Sangat Sesuai']
                    },
                    {
                        dimension: 'PERILAKU IMPULSIF & AGRESIF',
                        color: 'bg-orange-500',
                        image: '/assets/images/q1-narsisme.svg',
                        alt: 'Ilustrasi Impulsif',
                        text: '"Dia sering bertindak impulsif tanpa memikirkan konsekuensinya, mudah marah secara tiba-tiba, dan sulit mengendalikan emosi saat menghadapi situasi yang tidak sesuai keinginannya."',
                        options: ['Sangat Tidak Sesuai', 'Tidak Sesuai', 'Netral', 'Sangat Sesuai']
                    },
                    {
                        dimension: 'KECENDERUNGAN EKSPLOITASI SOSIAL',
                        color: 'bg-rose-500',
                        image: '/assets/images/q2-machiavellian.svg',
                        alt: 'Ilustrasi Eksploitasi',
                        text: '"Dia cenderung memanfaatkan orang lain untuk keuntungan pribadi, tidak segan mengambil keuntungan dari situasi, dan sering mengabaikan hak atau perasaan orang lain demi tujuannya."',
                        options: ['Sangat Tidak Sesuai', 'Tidak Sesuai', 'Netral', 'Sangat Sesuai']
                    }
                ],
                selectAnswer(qIdx, value) {
                    this.answers[qIdx] = value;
                },
                nextQuestion() {
                    if (!this.answers[this.currentQuestion - 1]) {
                        alert('Silakan pilih jawaban terlebih dahulu.');
                        return;
                    }
                    if (this.currentQuestion < this.totalQuestions) {
                        this.currentQuestion++;
                    } else {
                        this.step = 'identity';
                    }
                },
                prevQuestion() {
                    if (this.currentQuestion > 1) this.currentQuestion--;
                },
                submitQuiz() {
                    if (!this.email || !this.email.includes('@') || !this.email.includes('.')) {
                        this.emailError = true;
                        return;
                    }
                    this.emailError = false;
                    this.isSubmitting = true;
                    this.step = 'loading';
                    this.startLoading();

                    const formData = new FormData();
                    formData.append('email', this.email);
                    formData.append('nama', this.nama);
                    formData.append('q1', this.answers[0] || '');
                    formData.append('q2', this.answers[1] || '');
                    formData.append('q3', this.answers[2] || '');
                    formData.append('q4', this.answers[3] || '');
                    formData.append('q5', this.answers[4] || '');

                    fetch('/submit-tes', {
                        method: 'POST',
                        body: formData
                    })
                    .then(res => res.json())
                    .then(data => {
                        if (data.error) {
                            alert('Gagal memproses: ' + data.error);
                            this.step = 'identity';
                            this.isSubmitting = false;
                            return;
                        }
                        this.finishLoading(data.id);
                    })
                    .catch(err => {
                        alert('Terjadi kesalahan: ' + err.message);
                        this.step = 'identity';
                        this.isSubmitting = false;
                    });
                },
                startLoading() {
                    this.loadProgress = 0;
                    this.loadingText = this.loadingTexts[0];
                    let textIndex = 0;
                    let interval = setInterval(() => {
                        if (this.loadProgress < 100) {
                            this.loadProgress += 1;
                            if (this.loadProgress % 25 === 0 && textIndex < 3) {
                                textIndex++;
                                this.loadingText = this.loadingTexts[textIndex];
                            }
                        } else {
                            clearInterval(interval);
                        }
                    }, 40);
                    this._loadInterval = interval;
                },
                finishLoading(userId) {
                    if (this._loadInterval) {
                        clearInterval(this._loadInterval);
                    }
                    this.loadProgress = 100;
                    this.loadingText = 'Selesai';
                    setTimeout(() => {
                        window.location.href = '/paywall/' + userId;
                    }, 800);
                }
            }));
        });
    </script>
</body>
</html>
