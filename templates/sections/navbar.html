{{define "navbar"}}
<header x-data="{ mobileOpen: false }" class="fixed top-0 z-50 w-full border-b border-[var(--bord)] bg-white/70 backdrop-blur-xl">
    <div class="mx-auto flex h-16 max-w-[1280px] items-center justify-between px-6">
        <!-- Logo -->
        <a href="/" class="flex items-center gap-3 no-underline">
            <div class="flex h-8 w-8 items-center justify-center rounded-lg" style="background: linear-gradient(135deg, #ef4444, #dc2626);">
                <span class="material-symbols-outlined text-white text-lg">psychology</span>
            </div>
            <h2 class="m-0 text-lg font-bold tracking-tight text-[var(--textMain)]">ShadowSelf</h2>
        </a>

        <!-- Desktop Nav -->
        <nav class="hidden md:flex items-center gap-8">
            <a href="/" class="text-sm font-medium text-[var(--textMuted)] hover:text-[var(--textMain)] transition-colors no-underline flex items-center gap-1">
                <span class="material-symbols-outlined text-base">home</span>
                Beranda
            </a>
            <a href="/tentang" class="text-sm font-medium text-[var(--textMuted)] hover:text-[var(--textMain)] transition-colors no-underline flex items-center gap-1">
                <span class="material-symbols-outlined text-base">info</span>
                Tentang
            </a>
            <a href="/quiz" class="inline-flex items-center justify-center gap-2 rounded-xl font-semibold transition-all duration-200 cursor-pointer no-underline bg-[var(--brand-500)] text-white hover:bg-[var(--brand-600)] shadow-glow h-9 px-4 text-sm">
                <span class="material-symbols-outlined text-base">play_arrow</span>
                Mulai Tes
            </a>
        </nav>

        <!-- Mobile: Hamburger + CTA -->
        <div class="flex md:hidden items-center gap-2">
            <a href="/quiz" class="inline-flex items-center justify-center gap-1 rounded-xl font-semibold transition-all duration-200 cursor-pointer no-underline bg-[var(--brand-500)] text-white hover:bg-[var(--brand-600)] h-8 px-3 text-xs">
                <span class="material-symbols-outlined text-sm">play_arrow</span>
                Mulai
            </a>
            <button @click="mobileOpen = !mobileOpen" class="flex h-9 w-9 items-center justify-center rounded-lg border border-[var(--bord)] bg-[var(--surface)] text-[var(--textMain)] transition-colors hover:border-[var(--brand-300)] hover:text-[var(--brand-500)] cursor-pointer">
                <span x-show="!mobileOpen" class="material-symbols-outlined text-lg">menu</span>
                <span x-show="mobileOpen" x-cloak class="material-symbols-outlined text-lg">close</span>
            </button>
        </div>
    </div>

    <!-- Mobile Menu -->
    <div x-show="mobileOpen" x-cloak x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 -translate-y-2" x-transition:enter-end="opacity-100 translate-y-0" class="md:hidden border-t border-[var(--bord)] bg-white">
        <nav class="flex flex-col px-4 py-3 gap-1 text-sm">
            <a href="/" @click="mobileOpen = false" class="flex items-center gap-2 px-3 py-2.5 rounded-lg hover:bg-[var(--brand-50)] text-[var(--textMuted)] hover:text-[var(--brand-500)] transition no-underline">
                <span class="material-symbols-outlined text-base">home</span>
                Beranda
            </a>
            <a href="/tentang" @click="mobileOpen = false" class="flex items-center gap-2 px-3 py-2.5 rounded-lg hover:bg-[var(--brand-50)] text-[var(--textMuted)] hover:text-[var(--brand-500)] transition no-underline">
                <span class="material-symbols-outlined text-base">info</span>
                Tentang
            </a>
            <a href="/quiz" @click="mobileOpen = false" class="flex items-center gap-2 px-3 py-2.5 rounded-lg bg-[var(--brand-50)] text-[var(--brand-500)] font-semibold transition no-underline">
                <span class="material-symbols-outlined text-base">play_arrow</span>
                Mulai Tes
            </a>
        </nav>
    </div>
</header>
{{end}}
