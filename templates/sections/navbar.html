{{define "navbar"}}
<header class="border-b border-neutral-250 dark:border-neutral-900 bg-white/80 dark:bg-neutral-950/80 backdrop-blur-md sticky top-0 z-50 px-6 py-4 transition-colors duration-300">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
        <!-- Logo -->
        <a href="/" class="flex items-center gap-2">
            <span class="text-red-600 dark:text-red-505 text-lg font-black tracking-widest font-mono">SHADOW<span class="text-neutral-900 dark:text-neutral-100">SELF</span></span>
            <span class="w-1.5 h-1.5 bg-red-650 dark:bg-red-500 rounded-full animate-pulse"></span>
        </a>
        
        <!-- Navigation Links -->
        <nav class="hidden md:flex items-center gap-8 text-sm font-medium text-neutral-600 dark:text-neutral-400">
            <a href="/" class="hover:text-neutral-900 dark:hover:text-white transition">Beranda</a>
            <a href="/produk" class="hover:text-neutral-900 dark:hover:text-white transition">Analisis Produk</a>
            <a href="/testimoni" class="hover:text-neutral-900 dark:hover:text-white transition">Testimoni</a>
            <a href="/faq" class="hover:text-neutral-900 dark:hover:text-white transition">FAQ</a>
        </nav>

        <!-- Action Area (Toggle & CTA) -->
        <div class="flex items-center gap-4">
            <!-- Theme Toggle Button -->
            <button @click="$store.theme.toggle()" 
                    class="p-2 rounded-lg bg-neutral-100 dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-800 text-neutral-600 dark:text-neutral-400 hover:text-neutral-900 dark:hover:text-white transition cursor-pointer" 
                    title="Toggle Theme">
                <!-- Sun Icon -->
                <svg x-show="!$store.theme.isDark" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" />
                </svg>
                <!-- Moon Icon -->
                <svg x-show="$store.theme.isDark" x-cloak xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4 text-amber-400">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" />
                </svg>
            </button>

            <!-- CTA Button -->
            <button @click="if(window.location.pathname === '/') { $dispatch('open-assessment') } else { window.location.href = '/?start=true' }" 
                    class="bg-neutral-900 hover:bg-neutral-800 dark:bg-neutral-100 dark:hover:bg-neutral-200 text-white dark:text-neutral-900 font-bold py-2 px-4 rounded-xl text-xs transition cursor-pointer">
                Mulai Tes
            </button>
        </div>
    </div>
</header>
{{end}}
