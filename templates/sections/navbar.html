{{define "navbar"}}
<header x-data="{ mobileOpen: false }" class="fixed top-0 z-50 w-full glass">
    <div class="mx-auto flex h-14 max-w-[1120px] items-center justify-between px-6 lg:px-8">
        <!-- Logo -->
        <a href="/" class="flex items-center gap-2 no-underline">
            <div class="flex h-7 w-7 items-center justify-center rounded-lg" style="background: var(--accent);">
                <span class="material-symbols-outlined text-white text-sm">psychology</span>
            </div>
            <span class="text-sm font-bold tracking-tight" style="color: var(--ink);">ShadowSelf</span>
        </a>

        <!-- Desktop Nav -->
        <nav class="hidden md:flex items-center gap-1">
            <a href="/" class="btn-ghost text-sm">Beranda</a>
            <a href="#tentang" class="btn-ghost text-sm">Tentang</a>
            <div class="w-px h-4 mx-2" style="background: var(--bordLight);"></div>
            <a href="/quiz" class="btn-primary text-sm px-5 py-2">
                <span class="material-symbols-outlined text-sm">play_arrow</span>
                Mulai Tes
            </a>
        </nav>

        <!-- Mobile -->
        <div class="flex md:hidden items-center gap-2">
            <a href="/quiz" class="btn-primary text-xs px-4 py-1.5 rounded-lg">
                <span class="material-symbols-outlined text-xs">play_arrow</span>
                Mulai
            </a>
            <button @click="mobileOpen = !mobileOpen" class="flex h-9 w-9 items-center justify-center rounded-lg border" style="border-color: var(--bordLight); background: var(--surface); color: var(--ink); cursor: pointer;">
                <span x-show="!mobileOpen" class="material-symbols-outlined text-lg">menu</span>
                <span x-show="mobileOpen" x-cloak class="material-symbols-outlined text-lg">close</span>
            </button>
        </div>
    </div>

    <!-- Mobile Menu -->
    <div x-show="mobileOpen" x-cloak x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 -translate-y-2" x-transition:enter-end="opacity-100 translate-y-0" x-transition:leave="transition ease-in duration-150" x-transition:leave-start="opacity-100 translate-y-0" x-transition:leave-end="opacity-0 -translate-y-2" class="md:hidden border-t" style="border-color: var(--bordLight); background: var(--surface);">
        <nav class="flex flex-col px-4 py-3 gap-1 text-sm">
            <a href="/" @click="mobileOpen = false" class="flex items-center gap-3 px-4 py-3 rounded-lg no-underline font-medium hover-bg" style="color: var(--inkMuted);">
                <span class="material-symbols-outlined text-base">home</span>
                Beranda
            </a>
            <a href="#tentang" @click="mobileOpen = false" class="flex items-center gap-3 px-4 py-3 rounded-lg no-underline font-medium hover-bg" style="color: var(--inkMuted);">
                <span class="material-symbols-outlined text-base">info</span>
                Tentang
            </a>
            <hr style="border: none; border-top: 1px solid var(--bordLight); margin: 4px 0;">
            <a href="/quiz" @click="mobileOpen = false" class="flex items-center gap-3 px-4 py-3 rounded-lg font-semibold no-underline" style="background: var(--bg); color: var(--ink);">
                <span class="material-symbols-outlined text-base">play_arrow</span>
                Mulai Tes
            </a>
        </nav>
    </div>
</header>
{{end}}
