{{define "navbar"}}
<header x-data="{ mobileOpen: false }" class="fixed top-0 z-50 w-full glass" role="banner">
    <div class="mx-auto flex h-14 max-w-[1120px] items-center justify-between px-6 lg:px-8">
        <!-- Logo -->
        <a href="/" class="flex items-center gap-2 no-underline" aria-label="ShadowSelf Beranda">
            <div class="flex h-7 w-7 items-center justify-center rounded-lg" style="background: var(--accent);">
                <span class="material-symbols-outlined text-white text-sm" aria-hidden="true">psychology</span>
            </div>
            <span class="text-sm font-bold tracking-tight">ShadowSelf</span>
        </a>

        <!-- Desktop Nav -->
        <nav class="hidden md:flex items-center gap-1" aria-label="Navigasi utama">
            <a href="/" class="btn-ghost text-sm" aria-current="page">Beranda</a>
            <a href="#tentang" class="btn-ghost text-sm">Tentang</a>
            <div class="w-px h-4 mx-2" style="background: var(--bordLight);" aria-hidden="true"></div>
            <a href="/quiz" class="btn-primary text-sm px-5 py-2">
                <span class="material-symbols-outlined text-sm" aria-hidden="true">play_arrow</span>
                Mulai Tes
            </a>
        </nav>

        <!-- Mobile -->
        <div class="flex md:hidden items-center gap-2">
            <a href="/quiz" class="btn-primary text-xs px-4 py-1.5 rounded-lg">
                <span class="material-symbols-outlined text-xs" aria-hidden="true">play_arrow</span>
                Mulai
            </a>
            <button @click="mobileOpen = !mobileOpen"
                    :aria-expanded="mobileOpen"
                    aria-controls="mobile-menu"
                    aria-label="Buka menu navigasi"
                    class="flex h-9 w-9 items-center justify-center rounded-lg border"
                    style="border-color: var(--bordLight); background: var(--surface); color: var(--ink); cursor: pointer;">
                <span x-show="!mobileOpen" class="material-symbols-outlined text-lg" aria-hidden="true">menu</span>
                <span x-show="mobileOpen" x-cloak class="material-symbols-outlined text-lg" aria-hidden="true">close</span>
            </button>
        </div>
    </div>

    <!-- Mobile Menu -->
    <div id="mobile-menu"
         x-show="mobileOpen"
         x-cloak
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0 -translate-y-2"
         x-transition:enter-end="opacity-100 translate-y-0"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100 translate-y-0"
         x-transition:leave-end="opacity-0 -translate-y-2"
         class="md:hidden border-t"
         style="border-color: var(--bordLight); background: var(--surface);"
         role="navigation"
         aria-label="Navigasi mobile">
        <nav class="flex flex-col px-4 py-3 gap-1 text-sm">
            <a href="/" @click="mobileOpen = false" class="flex items-center gap-3 px-4 py-3 rounded-lg no-underline font-medium hover-bg" style="color: var(--inkMuted);">
                <span class="material-symbols-outlined text-base" aria-hidden="true">home</span>
                Beranda
            </a>
            <a href="#tentang" @click="mobileOpen = false" class="flex items-center gap-3 px-4 py-3 rounded-lg no-underline font-medium hover-bg" style="color: var(--inkMuted);">
                <span class="material-symbols-outlined text-base" aria-hidden="true">info</span>
                Tentang
            </a>
            <hr style="border: none; border-top: 1px solid var(--bordLight); margin: 4px 0;" aria-hidden="true">
            <a href="/quiz" @click="mobileOpen = false" class="flex items-center gap-3 px-4 py-3 rounded-lg font-semibold no-underline" style="background: var(--bg); color: var(--ink);">
                <span class="material-symbols-outlined text-base" aria-hidden="true">play_arrow</span>
                Mulai Tes
            </a>
        </nav>
    </div>
</header>
{{end}}
