{{define "navbar"}}
<header x-data="{ mobileOpen: false }" class="border-b border-neutral-200 dark:border-neutral-800 bg-white dark:bg-neutral-950 sticky top-0 z-50">
    <div class="max-w-5xl mx-auto px-4 sm:px-6 h-14 flex items-center justify-between">
        <!-- Logo -->
        <a href="/" class="flex items-center gap-2">
            <span class="text-red-600 dark:text-red-400 font-bold tracking-wider text-sm">SHADOWSELF</span>
        </a>

        <!-- Desktop Nav -->
        <nav class="hidden md:flex items-center gap-6 text-sm text-neutral-600 dark:text-neutral-400">
            <a href="/" class="hover:text-neutral-900 dark:hover:text-white transition">Beranda</a>
            <a href="/tentang" class="hover:text-neutral-900 dark:hover:text-white transition">Tentang</a>
            <a href="/quiz" class="bg-neutral-900 hover:bg-neutral-800 dark:bg-neutral-100 dark:hover:bg-neutral-200 text-white dark:text-neutral-900 font-medium px-4 py-2 rounded-lg text-sm transition">
                Mulai Tes
            </a>
        </nav>

        <!-- Mobile: Hamburger + CTA -->
        <div class="flex md:hidden items-center gap-2">
            <a href="/quiz" class="bg-neutral-900 dark:bg-neutral-100 text-white dark:text-neutral-900 font-medium px-3 py-1.5 rounded-lg text-xs transition">
                Mulai Tes
            </a>
            <button @click="mobileOpen = !mobileOpen" class="p-2 text-neutral-600 dark:text-neutral-400 hover:text-neutral-900 dark:hover:text-white transition cursor-pointer">
                <svg x-show="!mobileOpen" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
                </svg>
                <svg x-show="mobileOpen" x-cloak xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>
    </div>

    <!-- Mobile Menu -->
    <div x-show="mobileOpen" x-cloak x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 -translate-y-2" x-transition:enter-end="opacity-100 translate-y-0" class="md:hidden border-t border-neutral-200 dark:border-neutral-800 bg-white dark:bg-neutral-950">
        <nav class="flex flex-col px-4 py-3 gap-1 text-sm">
            <a href="/" @click="mobileOpen = false" class="px-3 py-2 rounded-lg hover:bg-neutral-100 dark:hover:bg-neutral-900 text-neutral-700 dark:text-neutral-300 transition">Beranda</a>
            <a href="/tentang" @click="mobileOpen = false" class="px-3 py-2 rounded-lg hover:bg-neutral-100 dark:hover:bg-neutral-900 text-neutral-700 dark:text-neutral-300 transition">Tentang</a>
            <a href="/quiz" @click="mobileOpen = false" class="px-3 py-2 rounded-lg bg-red-50 dark:bg-red-950/30 text-red-600 dark:text-red-400 font-medium transition">Mulai Tes</a>
        </nav>
    </div>
</header>
{{end}}
