{{define "navbar"}}
<header x-data="{ mobileOpen: false }" class="fixed top-0 z-50 w-full glass transition-all duration-300">
    <div class="mx-auto flex h-16 max-w-[1280px] items-center justify-between px-6 lg:px-8">
        <!-- Logo -->
        <a href="/" class="flex items-center gap-2.5 no-underline group">
            <div class="flex h-8 w-8 items-center justify-center rounded-xl transition-all duration-300 group-hover:scale-110 group-hover:shadow-lg" style="background: linear-gradient(135deg, #10b981, #059669);">
                <span class="material-symbols-outlined text-white text-lg">psychology</span>
            </div>
            <span class="text-base font-bold tracking-tight text-[var(--textMain)] transition-colors duration-200 group-hover:text-[var(--accent-600)]">ShadowSelf</span>
        </a>

        <!-- Desktop Nav -->
        <nav class="hidden md:flex items-center gap-1">
            <a href="/" class="btn-ghost text-sm rounded-xl px-4 py-2 transition-all duration-200">Beranda</a>
            <a href="/tentang" class="btn-ghost text-sm rounded-xl px-4 py-2 transition-all duration-200">Tentang</a>
            <div class="w-px h-5 bg-[var(--bordLight)] mx-2"></div>
            <a href="/quiz" class="btn-primary text-sm px-5 py-2 shadow-glow animate-pulse-glow transition-all duration-300">
                <span class="material-symbols-outlined text-base">play_arrow</span>
                Mulai Tes
            </a>
        </nav>

        <!-- Mobile: Hamburger + CTA -->
        <div class="flex md:hidden items-center gap-2">
            <a href="/quiz" class="btn-primary text-xs px-4 py-2 rounded-xl shadow-glow transition-all duration-300">
                <span class="material-symbols-outlined text-sm">play_arrow</span>
                Mulai
            </a>
            <button @click="mobileOpen = !mobileOpen" class="flex h-10 w-10 items-center justify-center rounded-xl border border-[var(--bordLight)] bg-white text-[var(--textMain)] transition-all duration-200 hover:border-[var(--accent-300)] hover:text-[var(--accent-500)] hover:bg-[var(--accent-50)] hover:shadow-md cursor-pointer" :class="{ 'border-[var(--accent-300)] bg-[var(--accent-50)] text-[var(--accent-500)]': mobileOpen }">
                <span x-show="!mobileOpen" class="material-symbols-outlined text-xl">menu</span>
                <span x-show="mobileOpen" x-cloak class="material-symbols-outlined text-xl">close</span>
            </button>
        </div>
    </div>

    <!-- Mobile Menu -->
    <div x-show="mobileOpen" x-cloak x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 -translate-y-3" x-transition:enter-end="opacity-100 translate-y-0" x-transition:leave="transition ease-in duration-150" x-transition:leave-start="opacity-100 translate-y-0" x-transition:leave-end="opacity-0 -translate-y-3" class="md:hidden border-t border-[var(--bordLight)] bg-white shadow-xl rounded-b-2xl">
        <nav class="flex flex-col px-4 py-4 gap-1.5 text-sm">
            <a href="/" @click="mobileOpen = false" class="flex items-center gap-3 px-4 py-3.5 rounded-xl hover:bg-[var(--accent-50)] text-[var(--textMuted)] hover:text-[var(--accent-600)] transition-all duration-200 no-underline font-medium">
                <span class="material-symbols-outlined text-base">home</span>
                Beranda
            </a>
            <a href="/tentang" @click="mobileOpen = false" class="flex items-center gap-3 px-4 py-3.5 rounded-xl hover:bg-[var(--accent-50)] text-[var(--textMuted)] hover:text-[var(--accent-600)] transition-all duration-200 no-underline font-medium">
                <span class="material-symbols-outlined text-base">info</span>
                Tentang
            </a>
            <hr class="border-t border-[var(--bordLight)] my-1">
            <a href="/quiz" @click="mobileOpen = false" class="flex items-center gap-3 px-4 py-3.5 rounded-xl bg-[var(--accent-50)] text-[var(--accent-600)] font-semibold transition-all duration-200 no-underline hover:bg-[var(--accent-100)]">
                <span class="material-symbols-outlined text-base">play_arrow</span>
                Mulai Tes
            </a>
        </nav>
    </div>
</header>
{{end}}
